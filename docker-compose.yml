services:
  db:
    image: postgres:16-alpine
    container_name: clasificador_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clasificador_imagenes_ia
      POSTGRES_USER: clasificador_app
      POSTGRES_PASSWORD: ClasificadorIA2026Local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clasificador_app -d clasificador_imagenes_ia"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./BACKENDIA
    container_name: clasificador_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://clasificador_app:ClasificadorIA2026Local@db:5432/clasificador_imagenes_ia
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
      IMAGE_UPLOAD_DIR: /app/imagenes_analizadas
      MAX_IMAGE_MB: 8
      TF_CPP_MIN_LOG_LEVEL: 2
    ports:
      - "8000:8000"
    volumes:
      - imagenes_analizadas:/app/imagenes_analizadas
      - keras_cache:/root/.keras
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./FRONTENDIA
      args:
        VITE_API_URL: /api
    container_name: clasificador_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  imagenes_analizadas:
  keras_cache:
